<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us | HealthXRay - Get in Touch</title>

<meta name="description" content="Contact HealthXRay for support, feedback, or inquiries. Reach out to us for help with health tools, calculators, and online services.">

<meta name="keywords" content="Contact HealthXRay, healthxray support, contact health website, health tools help, online health calculator support">

<meta name="robots" content="index, follow">

<!-- Open Graph for Social Media -->
<meta property="og:title" content="Contact Us | HealthXRay">
<meta property="og:description" content="Get in touch with HealthXRay for support, feedback, and health-related services.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://www.healthxray.online/contact.html">
  <link rel="canonical" href="https://www.healthxray.online/contact.html">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">

<link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">

<link rel="icon" type="image/png" sizes="192x192" href="favicon_io/android-chrome-192x192.png">
<link rel="icon" type="image/png" sizes="512x512" href="favicon_io/android-chrome-512x512.png">

<link rel="manifest" href="favicon_io/site.webmanifest">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        :root {
            --primary: #2c786c;
            --secondary: #ff7e5f;
            --accent: #f8b400;
            --success: #28a745;
            --light: #f9f9f9;
            --dark: #2c3e50;
            --gray: #6c757d;
            --pink-light: #ffffff;
            --pink-dark: #557c6e;
            --border-radius: 12px;
            --box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4edf5 100%);
            color: #333;
            line-height: 1.7;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 40px;
          
        }
        
        h1 {
            color: var(--primary);
            margin-bottom: 30px;
            font-size: 2.5em;
            text-align: center;
        }
        
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }
        
        .contact-card {
            background: linear-gradient(135deg, var(--pink-dark), var(--secondary));
            padding: 30px;
            border-radius: var(--border-radius);
            color: white;
            text-align: center;
            transition: transform 0.3s;
        }
        
        .contact-card:hover {
            transform: translateY(-5px);
        }
        
        .contact-card i {
            font-size: 3em;
            margin-bottom: 15px;
            color: white;
        }
        
        .contact-card h3 {
            margin-bottom: 10px;
            font-size: 1.5em;
        }
        
        .contact-card p {
            font-size: 1.1em;
        }
        
        .contact-form {
            background: var(--pink-light);
            padding: 30px;
            border-radius: var(--border-radius);
            margin-bottom: 30px;
        }
        
        .contact-form h2 {
            color: var(--pink-dark);
            margin-bottom: 20px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--dark);
            font-weight: 600;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: var(--border-radius);
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--pink-dark);
            box-shadow: 0 0 0 3px rgba(232, 62, 140, 0.1);
        }
        
        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }
        
        .submit-btn {
            background: linear-gradient(45deg, var(--pink-dark), var(--secondary));
            color: white;
            padding: 16px 40px;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 20px rgba(232, 62, 140, 0.3);
        }
        
        .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background: var(--gray);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            transition: transform 0.3s;
            margin-bottom: 20px;
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 25px 20px;
            }
            
            h1 {
                font-size: 2rem;
            }
            
            .contact-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
        
        <h1>Contact Us</h1>
        
        <div class="contact-grid">
            <div class="contact-card">
                <i class="fas fa-phone"></i>
                <h3>Phone</h3>
                <p>03447814644</p>
            </div>
            
            <div class="contact-card">
                <i class="fas fa-envelope"></i>
                <h3>Email</h3>
                <p>healthxray14@gmail.com</p>
            </div>
            
            <div class="contact-card">
                <i class="fas fa-clock"></i>
                <h3>Support Hours</h3>
                <p>24/7 Available</p>
            </div>
        </div>
        
        <div class="contact-form">
            <h2>Send Us a Message</h2>
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fas fa-paper-plane"></i> Send Message
                </button>
            </form>
        </div>
    </div>
    
    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Thank you for your message! We will get back to you soon.');
            this.reset();
        });
    </script>
</body>
</html>
