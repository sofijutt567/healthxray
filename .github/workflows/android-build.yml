name: HealthXRay Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: |
          npm install
          npm install jetifier --save-dev

      - name: Sync & Inject AdMob SDK
        run: |
          npx cap sync android
          # AdMob SDK ko build file mein manually add karna
          echo "dependencies { implementation 'com.google.android.gms:play-services-ads:22.6.0' }" >> android/app/build.gradle
          # Jetifier run karna purane code ko naye mein badalne ke liye
          npx jetifier -p android/capacitor-cordova-android-plugins

      - name: Universal AndroidX Fix
        run: |
          find android -name "*.java" -exec sed -i 's/android.support.annotation/androidx.annotation/g' {} +

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HealthXRay-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
