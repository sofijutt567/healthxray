name: HealthXRay Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm install
          npm install jetifier --save-dev
          npm install cordova-promise-polyfill cordova-admob-sdk --save

      - name: Sync & Jetify
        run: |
          npx cap sync android
          npx jetifier

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
