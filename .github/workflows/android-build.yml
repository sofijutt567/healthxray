name: HealthXRay Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm install
          npm install jetifier --save-dev

      - name: Sync & Global Dependency Fix
        run: |
          npx cap sync android
          
          # Sabse important: Root build.gradle mein Ads library dalna
          sed -i '/repositories {/a \        mavenCentral()' android/build.gradle
          
          # Har module (plugins) ke liye ads library force inject karna
          find android -name "build.gradle" -exec sed -i '/dependencies {/a \    implementation "com.google.android.gms:play-services-ads:23.0.0"' {} +
          
          # Jetifier and Legacy Support Fix
          npx jetifier -p android
          find android -name "*.java" -exec sed -i 's/android.support.annotation/androidx.annotation/g' {} +
          find android -name "*.java" -exec sed -i 's/android.support.v4.app/androidx.core.app/g' {} +
          find android -name "*.java" -exec sed -i 's/android.support.v4.content/androidx.core.content/g' {} +

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HealthXRay-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
