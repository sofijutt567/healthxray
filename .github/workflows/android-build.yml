name: HealthXRay Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm install
          npm install jetifier --save-dev

      - name: Sync & Deep Fix
        run: |
          npx cap sync android
          # 1. Jetifier chalao
          npx jetifier -p android
          # 2. Zabardasti saari annotations aur support libraries replace karo
          find android -name "*.java" -exec sed -i 's/android.support.annotation/androidx.annotation/g' {} +
          find android -name "*.java" -exec sed -i 's/android.support.v4.app/androidx.core.app/g' {} +
          find android -name "*.java" -exec sed -i 's/android.support.v4.content/androidx.core.content/g' {} +

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HealthXRay-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
