name: HealthXRay Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm install
          npm install jetifier --save-dev

      - name: Sync & Jetify
        run: |
          npx cap sync android
          npx jetifier

      - name: Universal AndroidX Fix
        run: |
          # Poore android folder mein jahan bhi purani support library hai, usay replace karein
          grep -rl "android.support.annotation.NonNull" android | xargs sed -i 's/android.support.annotation.NonNull/androidx.annotation.NonNull/g' || true
          grep -rl "android.support.annotation.Nullable" android | xargs sed -i 's/android.support.annotation.Nullable/androidx.annotation.Nullable/g' || true

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HealthXRay-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
