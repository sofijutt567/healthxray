name: HealthXRay Build
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: |
          npm install
          npm install jetifier --save-dev

      - name: Sync & Targeted Fix
        run: |
          npx cap sync android
          
          # 1. Root build.gradle mein sirf repositories fix karna (Safety first)
          sed -i 's/google()/google()\n        mavenCentral()/g' android/build.gradle
          
          # 2. Ads library ko sirf App module mein dalna (Sahi tareeka)
          sed -i '/dependencies {/a \    implementation "com.google.android.gms:play-services-ads:23.0.0"' android/app/build.gradle
          
          # 3. Jetifier and AndroidX migration
          npx jetifier -p android
          find android/capacitor-cordova-android-plugins -name "*.java" -exec sed -i 's/android.support.annotation/androidx.annotation/g' {} +
          find android/capacitor-cordova-android-plugins -name "*.java" -exec sed -i 's/android.support.v4.app/androidx.core.app/g' {} +

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HealthXRay-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
