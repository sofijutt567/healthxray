name: HealthXRay Capacitor Build
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install Dependencies
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android
          # AdMob ki missing dependencies force install karein
          npm install cordova-promise-polyfill cordova-admob-sdk --save

      - name: Initialize & Sync Android
        run: |
          # Agar android folder nahi hai to add karein
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          # Gradlew check aur permissions
          if [ ! -f "gradlew" ]; then
            echo "Gradlew missing, repairing..."
            gradle wrapper
          fi
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HealthXRay-Cap-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
